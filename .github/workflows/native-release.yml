##
## native-release.yml — PRD-4 release gate + GitHub Release (S4/#63) + PRD-5 npm publish (S3/#77).
##
## On a version tag (`v*`), build and acceptance-test ALL FOUR tuples (the reused fail-closed matrix),
## then (a) publish the verified binaries as a GitHub Release and (b) publish the npm Platform packages
## + Launcher. The build is the GATE: a red acceptance IT on ANY tuple fails `build` → nothing downstream
## runs → nothing is released or published.
##
## Job graph:
##   version-policy ──▶ build (4-tuple matrix, native-acceptance.yml) ──▶ release    (GitHub Release; tag only)
##                                                                    └─▶ npm-publish (Platform pkgs → Launcher)
##
## VERSIONING POLICY (D58 / CLAUDE.md "Versioning policy", fail-closed): `version-policy` runs FIRST and
## rejects any tag whose MAJOR version >= 1 until a minimally stable first delivery + maintainer approval.
## It gates `build` too, so an accidental `v1.x` tag fails in seconds, before the ~30-min matrix. Pre-1.0
## releases are `0.x` and MAY carry `-alpha/-beta/-rc` pre-release identifiers; those PUBLISH FOR REAL.
##
## DRY-RUN MODEL (irreversibility guard): a real `npm publish` happens ONLY on a real `v*` tag push.
## `workflow_dispatch` is ALWAYS `--dry-run` — it is the safe way to exercise the publish pipeline (run it
## on a feature branch via `gh workflow run native-release.yml --ref <branch>`) without burning a public
## version. `--dry-run` proves package assembly, ordering, and version-stamping; it does NOT prove the
## registry auth handshake, provenance landing, or live optionalDependencies resolution — only the first
## real `v*` tag proves those.
##
## npm AUTH (D59, supersedes D57's mixed-auth): EVERY package — the 4 `@no-bash-mcp/<tuple>` Platform
## packages AND the `no-bash-mcp` Launcher — publishes via OIDC trusted publishing (environment
## `npm-publish`, no token in env). The v0.0.1-alpha.1 dry-run-passed but the real publish hit `EOTP`
## (a granular token without bypass-2FA cannot satisfy npm's 2FA gate non-interactively), so the channel
## moved to its intended token-free end-state now rather than later. BOOTSTRAP (one-time, HITL, done
## before this workflow can publish): each scoped package's FIRST publish is a manual interactive
## placeholder (`npm publish`, passkey) — OIDC can only attach to an already-published package
## (npm/cli#8544) — after which a trusted publisher is configured per package. Order: every Platform
## package BEFORE the Launcher, so the Launcher's optionalDependencies resolve (D38/G18). Provenance
## (CI OIDC → Sigstore) is attached on real publishes (`--provenance`, needs id-token: write). The
## `NPM_TOKEN` secret is no longer used by this workflow.
##
## Release artifact layout (GitHub Release, unchanged from #63):
##   no-bash-mcp-linux-x64 / -linux-arm64 / -darwin-arm64 / -win32-x64.exe + SHA256SUMS
##
name: Native Release

on:
  push:
    tags: [ "v*" ]   # NO paths filter — a tag always builds the full matrix (see header)
  workflow_dispatch: {}   # pipeline test — ALWAYS dry-run for npm publish; GitHub Release is skipped

jobs:
  # ── Pre-1.0 versioning policy guard (D58): fail-closed before the expensive matrix ──
  version-policy:
    name: enforce pre-1.0 versioning policy (D58)
    runs-on: ubuntu-latest
    steps:
      - name: Reject major >= 1 until the stability rule is lifted
        run: |
          set -euo pipefail
          REF="${GITHUB_REF:-}"
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
          else
            VERSION="0.0.0-dispatch"   # workflow_dispatch: pipeline test, dry-run, major 0
          fi
          MAJOR="${VERSION%%.*}"
          if [[ "$MAJOR" =~ ^[0-9]+$ ]] && [ "$MAJOR" -ge 1 ]; then
            echo "::error::Versioning policy (D58 / CLAUDE.md \"Versioning policy\"): the MAJOR version must stay 0 until a minimally stable first delivery AND maintainer approval. Refusing to release v$VERSION. Use 0.x (optionally -alpha/-beta/-rc), or lift the rule first."
            exit 1
          fi
          echo "version policy OK: v$VERSION (major 0)"

  # ── Release gate: build + acceptance-test all four tuples (reused matrix) ──
  build:
    name: build + acceptance gate (4-tuple matrix)
    needs: version-policy
    uses: ./.github/workflows/native-acceptance.yml
    secrets: inherit   # forward GITHUB_TOKEN so the reused workflow's setup-graalvm authenticates

  # ── Publish the verified binaries as a GitHub Release (real tag pushes only) ──
  release:
    name: publish GitHub Release artifacts
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # gh release create writes a release + uploads assets
    steps:
      - name: Download all verified native binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts   # each artifact lands in artifacts/<name>/<binary>

      - name: Assemble release layout + checksums
        run: |
          set -euo pipefail
          mkdir -p release
          cp artifacts/no-bash-mcp-linux-x64/no-bash-mcp     release/no-bash-mcp-linux-x64
          cp artifacts/no-bash-mcp-linux-arm64/no-bash-mcp   release/no-bash-mcp-linux-arm64
          cp artifacts/no-bash-mcp-darwin-arm64/no-bash-mcp  release/no-bash-mcp-darwin-arm64
          cp artifacts/no-bash-mcp-win32-x64/no-bash-mcp.exe release/no-bash-mcp-win32-x64.exe
          ( cd release && sha256sum * > SHA256SUMS )
          echo "── release/ ──"
          ls -l release
          cat release/SHA256SUMS

      - name: Create GitHub Release with the verified 4-tuple artifact set
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            release/no-bash-mcp-linux-x64 \
            release/no-bash-mcp-linux-arm64 \
            release/no-bash-mcp-darwin-arm64 \
            release/no-bash-mcp-win32-x64.exe \
            release/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

  # ── Publish the npm Platform packages + Launcher (PRD-5 S3) ──
  npm-publish:
    name: publish npm packages (Platform packages → Launcher)
    needs: build
    runs-on: ubuntu-latest
    # OIDC needs the environment claim (D57 configured the trusted publisher WITH environment
    # `npm-publish`), but ONLY a real publish authenticates — a --dry-run does not. So apply the
    # environment ONLY on a real `v*` tag publish; workflow_dispatch dry-runs then run WITHOUT the
    # environment and are not gated by its deployment-branch policy.
    # REQUIRED env config for the real publish: Settings > Environments > npm-publish > "Deployment
    # branches and tags" must ALLOW `v*` TAGS — "Selected branches and tags" + a Tag rule `v*`. A tag
    # is NOT a "protected branch", so "Protected branches only" rejects the tag-triggered publish.
    environment: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) && 'npm-publish' || '' }}
    permissions:
      id-token: write          # OIDC token: Launcher trusted publishing + provenance for all packages
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 24 (ships npm >= 11.5.1, the trusted-publishing floor)
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm / Node floor (npm >= 11.5.1, Node >= 22.14.0)
        run: |
          set -euo pipefail
          node --version
          npm --version

      - name: Download verified native binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts   # artifacts/no-bash-mcp-<tuple>/<binary>

      - name: Resolve version + dry-run mode (D58 policy already gated major >= 1)
        id: ver
        run: |
          set -euo pipefail
          REF="${GITHUB_REF:-}"
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF#refs/tags/v}"
            DRYRUN="false"   # a real tag → real publish
          else
            VERSION="0.0.0-dispatch"
            DRYRUN="true"    # workflow_dispatch → always dry-run
          fi
          # npm REFUSES to publish a prerelease (X.Y.Z-foo) to the default `latest` dist-tag, so derive
          # an explicit dist-tag from the version: the prerelease identifier (alpha/beta/rc/dispatch),
          # else `latest` for a stable 0.x.y. Pre-1.0 -alpha/-beta/-rc releases (D58) are prereleases,
          # so they always go under their own dist-tag — `latest` is never an unstable build, and the
          # Bootstrap skill's exact pins (D42) make `latest` being unset/placeholder harmless.
          case "$VERSION" in
            *-*) PRE="${VERSION#*-}"; NPMTAG="${PRE%%.*}";;
            *)   NPMTAG="latest";;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dryrun=$DRYRUN"   >> "$GITHUB_OUTPUT"
          echo "npmtag=$NPMTAG"   >> "$GITHUB_OUTPUT"
          echo "Resolved version=$VERSION dryrun=$DRYRUN npmtag=$NPMTAG"

      - name: Assemble Platform packages + Launcher (stage gated binaries + version-stamp)
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          for tuple in linux-x64 linux-arm64 darwin-arm64 win32-x64; do
            if [ "$tuple" = "win32-x64" ]; then b="no-bash-mcp.exe"; else b="no-bash-mcp"; fi
            mkdir -p "packages/$tuple/bin"
            cp "artifacts/no-bash-mcp-$tuple/$b" "packages/$tuple/bin/$b"
            if [ "$tuple" != "win32-x64" ]; then chmod 755 "packages/$tuple/bin/$b"; fi
            ( cd "packages/$tuple" && npm version "$VERSION" --no-git-tag-version --allow-same-version >/dev/null )
          done
          # Launcher: stamp version AND pin every optionalDependency to the EXACT same version (D42).
          node -e '
            const fs = require("fs");
            const f = "packages/launcher/package.json";
            const p = JSON.parse(fs.readFileSync(f, "utf8"));
            const v = process.argv[1];
            p.version = v;
            for (const k of Object.keys(p.optionalDependencies || {})) p.optionalDependencies[k] = v;
            fs.writeFileSync(f, JSON.stringify(p, null, 2) + "\n");
          ' "$VERSION"
          echo "── stamped launcher package.json ──"
          cat packages/launcher/package.json

      # Publish EVERY package via OIDC trusted publishing — NO token in env (D59, supersedes D57's
      # mixed-auth). NODE_AUTH_TOKEN is deliberately absent: its presence would override OIDC. Each of
      # the 4 `@no-bash-mcp/<tuple>` Platform packages AND the `no-bash-mcp` Launcher has its own
      # trusted publisher (repo `rodrigorjsf/no-bash-mcp` + workflow `native-release.yml` + environment
      # `npm-publish`); the job runs under that environment on a real `v*` tag, so OIDC authenticates
      # per package. Platform packages publish BEFORE the Launcher so its optionalDependencies resolve
      # (D38/G18). The scoped packages were bootstrapped (first publish) interactively before OIDC was
      # configured, because OIDC can only attach to an already-published package (npm/cli#8544).
      - name: Publish all packages via OIDC (Platform packages → Launcher, D38/G18)
        env:
          DRYRUN: ${{ steps.ver.outputs.dryrun }}
          NPMTAG: ${{ steps.ver.outputs.npmtag }}
        run: |
          set -euo pipefail
          # --tag is REQUIRED for prerelease versions (npm refuses `latest` for X.Y.Z-foo); --provenance
          # only on a real publish (needs a real registry write; moot under --dry-run).
          FLAGS="--access public --tag $NPMTAG"
          if [ "$DRYRUN" = "true" ]; then FLAGS="$FLAGS --dry-run"; else FLAGS="$FLAGS --provenance"; fi
          for tuple in linux-x64 linux-arm64 darwin-arm64 win32-x64; do
            echo "── npm publish @no-bash-mcp/$tuple ($FLAGS) ──"
            ( cd "packages/$tuple" && npm publish $FLAGS )
          done
          echo "── npm publish no-bash-mcp Launcher ($FLAGS) ──"
          ( cd packages/launcher && npm publish $FLAGS )
