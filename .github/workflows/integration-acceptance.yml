##
## integration-acceptance.yml — MCP Inspector --cli acceptance gate (issue #8)
##
## This workflow runs the Failsafe integration tests (*IT.java) against the packaged JVM jar.
## It is separate from the inline unit gate (which runs `mvn test` in the main CI workflow) so
## the external prerequisites (Node/npx, MCP Inspector, jq) are only required here.
##
## Prerequisites provisioned by this workflow:
##   - Java 25 (LTS) via Temurin — the same JDK the main build uses.
##   - Maven 3.9.x — from the system image; no wrapper needed (ADR-0008: trusted launcher).
##   - Node.js 22 LTS + npm — required for `npx` to run the pinned MCP Inspector.
##   - jq — pre-installed on ubuntu-latest; verified by `jq --version` step.
##   - MCP Inspector @modelcontextprotocol/inspector@0.14.1 — pinned; never @latest.
##   - ~/.m2 pre-warmed — the unit-test phase warms the cache; the IT runs after `mvn test`.
##
## How to run locally (after 'mvn test' has warmed ~/.m2):
##   mvn -DskipTests package   # build the jar
##   mvn verify                # package (skipped if already done) + integration-test + verify
##
## Pinned Inspector version: 0.14.1
## Bump the pinned version here AND in InspectorAcceptanceIT.INSPECTOR_VERSION together.
##
name: MCP Inspector Acceptance (IT)

on:
  # The repo's integration base is `development` and its default branch is `master`. The earlier
  # `develop`/`main` names never existed here, so this gate never triggered on `development` PRs —
  # part of why the acceptance suite went unverified. Watch the branches that actually exist.
  push:
    branches: [ "master", "development", "slice-*", "orchestrate/**" ]
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/integration-acceptance.yml"
  pull_request:
    branches: [ "master", "development" ]
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/integration-acceptance.yml"
  workflow_dispatch: {}

jobs:
  inspector-acceptance:
    name: Inspector --cli acceptance (JVM jar)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 25 (Temurin) ───────────────────────────────────────────────
      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          # Cache Maven local repo across runs to avoid cold-cache builds.
          # This pre-warms ~/.m2 with the project dependencies resolved during the test phase.
          cache: maven

      # ── 3. Node.js 22 LTS (for npx / MCP Inspector) ───────────────────────
      - name: Set up Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── 4. Verify jq is available ──────────────────────────────────────────
      - name: Verify jq
        run: jq --version

      # ── 5. Pre-warm the MCP Inspector (pinned @0.14.1) ────────────────────
      # Running `npx --yes @modelcontextprotocol/inspector@0.14.1 --version` before the tests
      # ensures the package is downloaded from the npm registry and cached in the runner's
      # npm cache. The IT probe (`probeInspector()`) reuses this warm cache without a network
      # fetch, keeping the IT fast and making its prerequisite check reliable.
      - name: Pre-warm MCP Inspector 0.14.1
        run: npx --yes @modelcontextprotocol/inspector@0.14.1 --version

      # ── 6. Verify Maven is available ──────────────────────────────────────
      - name: Verify mvn
        run: mvn --version

      # ── 7. Unit tests + JVM jar + Failsafe acceptance ITs (one lifecycle) ─
      # `mvn -B verify` runs the whole lifecycle in dependency order: Surefire unit tests (test),
      # the JVM jar (package), then the Failsafe integration tests (integration-test/verify).
      #
      # It MUST be the `verify` PHASE, not `-DskipTests` and not bare Failsafe goals:
      #   - `verify -DskipTests` would skip the ITs too — `skipTests` is shared by Surefire AND
      #     Failsafe — turning this gate into a silent no-op (the IT classes compile but never run).
      #   - `failsafe:integration-test` as a direct CLI goal binds to the `default-cli` execution,
      #     which does NOT inherit the pom's `<execution>`-scoped `<systemPropertyVariables>`, so
      #     `project.build.directory` is null and every Inspector --cli IT self-skips ("run via
      #     mvn verify, not directly") — a silent green for the very suite this gate exists to run.
      # The bound `verify` phase applies the Failsafe execution config, so `project.build.directory`
      # is injected and the Inspector ITs locate the packaged jar and actually execute. A failing IT
      # fails the build; ITs whose external prerequisites are absent self-skip (assumeTrue).
      - name: Unit tests + JVM jar + Failsafe acceptance ITs (mvn verify)
        run: mvn -B verify
