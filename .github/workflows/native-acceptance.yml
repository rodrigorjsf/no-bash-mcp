##
## native-acceptance.yml — PRD-4 native release gate, fanned across the build matrix.
##
## S1 (#59) landed linux-x64; S3a (#61) added linux-arm64 (same --static-nolibc model); S2 (#60)
## added darwin-arm64 (macos-14, ad-hoc signed); S3b (#62) adds win32-x64 (windows-latest). Each
## tuple builds the production server to a GraalVM native binary via the single AC flag
## `-Dpackaging=native-image` and drives that binary end-to-end through the fail-closed
## NativeAcceptanceIT release gate (a missing binary or a missing per-leg toolchain HARD-FAILS —
## never a silent skip).
##
## Per-OS variation (GraalVM native-image does NOT cross-compile — it builds for the host):
##   - linux-*  : `--static-nolibc` mostly-static binary (pom `native-linux` profile); the static link
##                is ASSERTED (no dynamic libz). Build + IT run in one `mvn verify` lifecycle.
##   - darwin   : system-dynamic binary (pom `native-macos` profile — macOS cannot static-link libc).
##                TWO-PHASE: build the binary (no IT) → strip → ad-hoc `codesign -s -` → THEN run the
##                IT against the SIGNED binary. An unsigned/strip-invalidated arm64 binary is SIGKILLed
##                by the OS and cannot be acceptance-tested at all (openai/codex#21199, D54/D41/G17),
##                so proving the re-signed binary spawns is the whole point of this leg.
##   - win32    : system-dynamic binary (pom `native-windows` profile → no-bash-mcp.exe). Build + IT
##                in one `mvn verify` (no strip/codesign). The IT SKIPS the mvn/npx legs — their
##                `.cmd` launchers can't be spawned without a shell the ADR-0008 posture forbids
##                (#62/G13) — and proves the go legs + spawn + Finding serde + stdout purity. The
##                mvn/npm-on-Windows gap is a documented, fail-clear limitation, not a silent pass.
##
## The IT's four legs each spawn a REAL subprocess from the native image:
##   - Maven  : `mvn` on a failing fixture        → ok=false, kind="test"
##   - Go     : `go test` on a failing fixture     → ok=false, kind="test"
##   - Go     : `go test` on a build-fail fixture  → ok=false, kind="container" (ContainerFinding)
##   - npm    : `npx jest --no-install`            → ok=false, kind="test", manager="npx"
## plus a stdout-purity assertion (§7) while a subprocess forks. Each verified binary is uploaded as a
## named artifact (no-bash-mcp-<tuple>).
##
## `fail-fast: false` keeps one tuple's red leg from cancelling the others — every tuple reports its
## own verdict so a per-arch regression is pinpointed, not masked.
##
## This is a SEPARATE workflow from integration-acceptance.yml (the JVM jar gate) because the native
## build is slow (~3 min); it still runs on every PR to the integration branches so a regression in
## the native form blocks the merge.
##
name: Native Acceptance

on:
  push:
    branches: [ "master", "development" ]
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/native-acceptance.yml"
  pull_request:
    branches: [ "master", "development" ]
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/native-acceptance.yml"
  workflow_dispatch: {}
  # Reusable: native-release.yml calls this on a version tag to build + acceptance-test all four
  # tuples as the release gate, then publishes the artifacts. workflow_call ignores the push `paths`
  # filter above, so a tag always builds the full matrix regardless of which files the tag commit
  # touched (the tags/paths interaction is otherwise undefined — #63).
  workflow_call: {}

jobs:
  native-acceptance:
    name: native acceptance IT (${{ matrix.tuple }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    # One shell on every OS: Git-bash on Windows runs the same bash `run:` blocks and expands
    # $GITHUB_WORKSPACE uniformly (the MSVC env setup-graalvm exports is inherited regardless).
    defaults:
      run:
        shell: bash
    strategy:
      # One red tuple must not cancel its siblings — each arch reports its own verdict.
      fail-fast: false
      matrix:
        include:
          - tuple: linux-x64
            runner: ubuntu-latest
            os: linux
            binary: no-bash-mcp
          - tuple: linux-arm64
            runner: ubuntu-24.04-arm   # GitHub-hosted aarch64 runner (free for public repos)
            os: linux
            binary: no-bash-mcp
          - tuple: darwin-arm64
            runner: macos-14           # GitHub-hosted Apple-silicon (arm64) runner
            os: macos
            binary: no-bash-mcp
          - tuple: win32-x64
            runner: windows-latest     # GitHub-hosted Windows x64 runner (MSVC for native-image)
            os: windows
            binary: no-bash-mcp.exe    # GraalVM appends .exe on Windows

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. GraalVM CE 25 (JDK 25) with native-image ───────────────────────
      # setup-graalvm resolves the host arch (x64 / aarch64) automatically — the same `java-version`
      # and distribution yield the matching image on each runner (linux-aarch64, darwin-aarch64; G15).
      - name: Set up GraalVM CE 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "25"
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: maven

      # ── 3. zlib static lib — REQUIRED by --static-nolibc (libz.a); Linux only ──
      - name: Install zlib1g-dev (libz.a for --static-nolibc)
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      # ── 4. Go toolchain (the two Go legs spawn `go test`) ─────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      # ── 5. Node.js 22 LTS (the npm leg spawns `npx jest`) ─────────────────
      - name: Set up Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── 6. Tooling sanity (fail early, before the slow native build) ──────
      - name: Verify jq / mvn / go / node
        run: |
          jq --version
          mvn --version
          go version
          node --version

      # ── 7. Provision the jest project out-of-band (the --no-install invariant) ──
      # run_tests runs jest with --no-install and never fetches; node_modules must exist BEFORE the
      # IT. We install the committed fixture and hand its absolute path to the IT. A failure here is
      # a real gate failure (the npm leg HARD-FAILS if node_modules/.bin/jest is absent under native).
      - name: Install the jest acceptance fixture (npm install)
        if: matrix.os != 'windows'   # the npx leg is skipped on Windows (.cmd spawn limitation, #62)
        working-directory: src/test/resources/fixtures/jest/project
        run: npm install --no-audit --no-fund

      # ════════════════════════════════════════════════════════════════════════
      #  LINUX / WINDOWS path — build + acceptance IT in one fail-closed `mvn verify`.
      # ════════════════════════════════════════════════════════════════════════
      # `-Dpackaging=native-image` flips the lifecycle (jar → native image) and auto-activates the
      # `native` + per-OS profile (linux: static-link buildArgs; windows: system-dynamic). `verify`
      # runs the unit suite, the native build, then Failsafe — where NativeAcceptanceIT drives the
      # binary. A red IT blocks the build. `-Dnbm.native.required=true` is passed EXPLICITLY
      # (belt-and-suspenders over the profile) so the gate is armed even if the profile→Failsafe
      # property binding regresses; without it the IT could read `false` and silently self-skip.
      # Neither OS needs strip/codesign post-processing, so build+IT run in one lifecycle. On Windows
      # the IT SKIPS the mvn/npx legs (.cmd spawn limitation, #62) and proves go + serde + stdout.
      - name: "[linux/windows] Build native + run NativeAcceptanceIT (release gate)"
        if: matrix.os == 'linux' || matrix.os == 'windows'
        run: |
          mvn -B -Dpackaging=native-image \
            -Dnbm.native.required=true \
            -Dnbm.it.jest.project.dir="$GITHUB_WORKSPACE/src/test/resources/fixtures/jest/project" \
            verify

      # ════════════════════════════════════════════════════════════════════════
      #  MACOS path — TWO-PHASE: build (no IT) → strip → codesign → IT on the SIGNED binary.
      # ════════════════════════════════════════════════════════════════════════
      # Phase 1: build ONLY (package, not verify) so the IT does NOT run against the unsigned, about-
      # to-be-stripped binary. The `native-macos` profile drops --static-nolibc (system-dynamic).
      - name: "[macos] Build native binary (no IT yet)"
        if: matrix.os == 'macos'
        run: mvn -B -Dpackaging=native-image package

      # ── 8/9. Strip the native binary (post-processing; mandated by #60 for macOS) ──
      # On macOS this INVALIDATES the linker's ad-hoc signature — the binary is now SIGKILLed until
      # re-signed (the exact failure the next step proves we recover from). Skipped on Windows
      # (no `strip` in the toolchain; GraalVM Windows binaries are shipped unstripped).
      - name: Strip the native binary
        if: matrix.os != 'windows'
        run: strip target/no-bash-mcp

      # ── 10. [linux] Assert the --static-nolibc form (no dynamic libz) ─────
      # A dynamic libz means the static link regressed and the binary is no longer portable across
      # glibc hosts (DESIGN.md §8).
      - name: "[linux] Assert static linking (libc-only; no dynamic libz)"
        if: matrix.os == 'linux'
        run: |
          file target/no-bash-mcp
          ldd target/no-bash-mcp || true
          if ldd target/no-bash-mcp | grep -qE 'libz\.so'; then
            echo "::error::native binary dynamically links libz — --static-nolibc regressed"
            exit 1
          fi

      # ── 11. [macos] Ad-hoc codesign AFTER strip + verify the signature ────
      # `codesign -s -` is the free/keyless ad-hoc identity (D54/D41/G17). Re-signing the stripped
      # binary makes it launchable again; `codesign --verify` asserts the signature is valid before
      # the IT spawns it.
      - name: "[macos] Ad-hoc codesign after strip"
        if: matrix.os == 'macos'
        run: |
          codesign --force --sign - target/no-bash-mcp
          codesign --verify --strict --verbose=2 target/no-bash-mcp
          codesign --display --verbose=2 target/no-bash-mcp

      # ── 12. [macos] Run NativeAcceptanceIT against the SIGNED binary ──────
      # Failsafe goals only (the native build already happened in phase 1) so the IT drives the
      # exact signed artifact, not a rebuild. `-Dnbm.native.required=true` arms the fail-closed gate
      # outside the `native` profile; `project.build.directory` points the IT at target/.
      - name: "[macos] Acceptance IT on the signed binary (release gate)"
        if: matrix.os == 'macos'
        run: |
          mvn -B \
            -Dnbm.native.required=true \
            -Dnbm.it.jest.project.dir="$GITHUB_WORKSPACE/src/test/resources/fixtures/jest/project" \
            -Dproject.build.directory="$GITHUB_WORKSPACE/target" \
            -Dit.test=NativeAcceptanceIT \
            test-compile failsafe:integration-test failsafe:verify

      # ── 13. Publish the verified binary as a named artifact ───────────────
      - name: Upload ${{ matrix.tuple }} native binary
        uses: actions/upload-artifact@v4
        with:
          name: no-bash-mcp-${{ matrix.tuple }}
          path: target/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 14
